name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          pip install pytest

      - name: Run pipeline tests
        run: pytest tests/ -v

      - name: Build index (dry run)
        run: python -m pipeline.build_index --source docs_source --out /tmp/index.json

      - name: Verify index integrity
        run: |
          python -c "
          import json, sys
          idx = json.load(open('/tmp/index.json'))
          assert idx['stats']['document_count'] >= 1
          assert idx['stats']['chunk_count'] >= 1
          assert idx['stats']['entity_count'] >= 1
          assert idx['bm25']['vocab']
          print('Index OK:', idx['stats'])
          "
